services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: sheraos-hub:latest
    container_name: sheraos-hub-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - sheraos-hub-data:/app/server/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=sheraos-hub-net
      - traefik.http.routers.sheraos-hub.rule=Host(`sheraos.com.br`) && PathPrefix(`/hub`)
      - traefik.http.routers.sheraos-hub.entrypoints=websecure
      - traefik.http.routers.sheraos-hub.tls=true
      - traefik.http.routers.sheraos-hub.tls.certresolver=letsencrypt
      - traefik.http.routers.sheraos-hub.priority=100
      - traefik.http.routers.sheraos-hub.middlewares=sheraos-hub-strip
      - traefik.http.middlewares.sheraos-hub-strip.stripprefix.prefixes=/hub
      - traefik.http.services.sheraos-hub.loadbalancer.server.port=3003
    networks:
      - sheraos-hub-net
volumes:
  sheraos-hub-data:
networks:
  sheraos-hub-net:
    name: sheraos-hub-net
    driver: bridge
